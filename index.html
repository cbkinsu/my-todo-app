<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a3a5c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>영업 다이어리</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --navy: #1a3a5c;
  --navy2: #254d7a;
  --navy3: #2d6199;
  --sky: #e8f2fb;
  --sky2: #c5ddf5;
  --sky3: #90bfe8;
  --gold: #c8860a;
  --gold-bg: #fef8ec;
  --gold-light: #fdebc6;
  --green: #1a7a4a;
  --green-bg: #eaf5ef;
  --green-light: #b8e0ca;
  --red: #b03030;
  --red-bg: #fceaea;
  --red-light: #f0b8b8;
  --gray: #4a5568;
  --gray-bg: #f4f6f9;
  --border: #dde3ec;
  --text: #1a2535;
  --text2: #4a5568;
  --text3: #8a95a3;
  --white: #ffffff;
  --radius-xl: 24px;
  --radius-lg: 18px;
  --radius-md: 12px;
  --radius-pill: 99px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--gray-bg); font-family: -apple-system, 'Noto Sans KR', sans-serif; color: var(--text); }

/* 로딩 */
#loading-overlay { position: fixed; inset: 0; background: var(--navy); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 999; }
#loading-overlay.hidden { display: none; }
.lo-icon { font-size: 52px; color: var(--sky); }
.lo-text { font-size: 15px; color: var(--sky2); }

.wrap { max-width: 480px; margin: 0 auto; padding: 14px 13px 100px; }

/* 동기화 */
.sync-bar { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; padding: 4px 12px; border-radius: var(--radius-pill); margin-bottom: 10px; }
.sync-bar.synced { background: var(--green-bg); color: var(--green); }
.sync-bar.syncing { background: var(--sky); color: var(--navy2); }
.sync-bar.offline { background: var(--red-bg); color: var(--red); }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.sync-bar.synced .sync-dot { background: var(--green); }
.sync-bar.syncing .sync-dot { background: var(--navy3); animation: blink 1s infinite; }
.sync-bar.offline .sync-dot { background: var(--red); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* 헤더 */
.header { background: var(--navy); border-radius: var(--radius-xl); padding: 18px 20px 14px; margin-bottom: 13px; }
.header-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
.header-date { font-size: 12px; color: var(--sky3); margin-bottom: 3px; }
.header-title { font-size: 20px; font-weight: 700; color: var(--white); display: flex; align-items: center; gap: 8px; }
.header-badge { background: var(--gold-bg); color: var(--gold); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: var(--radius-pill); border: 1px solid var(--gold-light); white-space: nowrap; margin-top: 4px; }

.tab-btns { display: flex; gap: 5px; }
.tab-btn { flex: 1; font-size: 12px; padding: 8px 4px; border-radius: var(--radius-pill); border: 1.5px solid #3a5a7a; background: transparent; color: var(--sky3); cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 4px; }
.tab-btn.active { background: var(--white); color: var(--navy); border-color: var(--white); font-weight: 700; }

/* KPI 카드 */
.kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; margin-bottom: 13px; }
.kpi { border-radius: var(--radius-lg); padding: 11px 8px; text-align: center; }
.kpi .kn { font-size: 22px; font-weight: 700; }
.kpi .kl { font-size: 10px; margin-top: 2px; font-weight: 500; }
.kpi.blue { background: var(--sky); } .kpi.blue .kn { color: var(--navy); } .kpi.blue .kl { color: var(--navy2); }
.kpi.gold { background: var(--gold-bg); } .kpi.gold .kn { color: var(--gold); } .kpi.gold .kl { color: #9a6500; }
.kpi.green { background: var(--green-bg); } .kpi.green .kn { color: var(--green); } .kpi.green .kl { color: #145c37; }
.kpi.red { background: var(--red-bg); } .kpi.red .kn { color: var(--red); } .kpi.red .kl { color: #8a2020; }

/* 섹션 라벨 */
.section-lbl { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }

/* 활동 추가 폼 */
.add-card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius-xl); padding: 16px; margin-bottom: 13px; }
.add-card-title { font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.form-row { display: flex; gap: 8px; margin-bottom: 8px; }
.form-row input, .form-row select, .form-row textarea { flex: 1; border: 1.5px solid var(--border); border-radius: var(--radius-pill); background: var(--gray-bg); color: var(--text); padding: 0 14px; font-size: 14px; outline: none; font-family: inherit; height: 42px; }
.form-row select { cursor: pointer; }
.form-row textarea { height: 70px; border-radius: var(--radius-md); padding: 10px 14px; resize: none; line-height: 1.4; }
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--navy3); background: var(--white); }
.type-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.type-btn { font-size: 12px; padding: 6px 13px; border-radius: var(--radius-pill); border: 1.5px solid var(--border); background: var(--gray-bg); color: var(--text2); cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 4px; }
.type-btn.active { border-color: var(--navy); background: var(--navy); color: var(--white); font-weight: 600; }
.submit-btn { width: 100%; height: 44px; border-radius: var(--radius-pill); border: none; background: var(--navy); color: var(--white); font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 4px; }
.submit-btn:active { background: var(--navy2); transform: scale(.98); }

/* 활동 카드 */
.activity-list { display: flex; flex-direction: column; gap: 9px; }
.act-card { background: var(--white); border-radius: var(--radius-lg); border: 1.5px solid var(--border); padding: 14px 15px; border-left: 4px solid var(--border); }
.act-card.call { border-left-color: var(--navy3); }
.act-card.meet { border-left-color: var(--gold); }
.act-card.contract { border-left-color: var(--green); }
.act-card.followup { border-left-color: #9b59b6; }
.act-card.done { opacity: .7; }
.act-top { display: flex; align-items: flex-start; gap: 10px; }
.act-type-badge { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: var(--radius-pill); white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
.act-type-badge.call { background: var(--sky); color: var(--navy); }
.act-type-badge.meet { background: var(--gold-bg); color: var(--gold); }
.act-type-badge.contract { background: var(--green-bg); color: var(--green); }
.act-type-badge.followup { background: #f3eafd; color: #6c2fa0; }
.act-body { flex: 1; }
.act-name { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.act-card.done .act-name { text-decoration: line-through; color: var(--text3); }
.act-detail { font-size: 12px; color: var(--text2); margin-bottom: 4px; line-height: 1.4; }
.act-meta { display: flex; gap: 8px; flex-wrap: wrap; }
.act-tag { font-size: 11px; padding: 2px 8px; border-radius: var(--radius-pill); background: var(--gray-bg); color: var(--text3); display: flex; align-items: center; gap: 3px; }
.act-status-row { display: flex; gap: 6px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
.act-btn { font-size: 12px; padding: 6px 13px; border-radius: var(--radius-pill); cursor: pointer; display: flex; align-items: center; gap: 4px; font-family: inherit; border: 1.5px solid var(--border); background: var(--gray-bg); color: var(--text2); }
.act-btn.done-btn { border-color: var(--green); background: var(--green-bg); color: var(--green); font-weight: 600; }
.act-btn.done-btn:active { background: var(--green-light); }
.act-btn.fail-btn { border-color: var(--red); background: var(--red-bg); color: var(--red); font-weight: 600; }
.act-btn.fail-btn:active { background: var(--red-light); }
.act-btn.del-btn:active { background: var(--red-bg); border-color: var(--red-light); color: var(--red); }
.act-btn.undo-btn { color: var(--navy3); border-color: var(--sky2); background: var(--sky); }
.act-status-badge { font-size: 11px; font-weight: 700; padding: 4px 11px; border-radius: var(--radius-pill); }
.act-status-badge.done { background: var(--green); color: var(--white); }
.act-status-badge.failed { background: var(--red); color: var(--white); }
.reason-box { margin-top: 9px; display: flex; flex-direction: column; gap: 6px; }
.reason-input { width: 100%; height: 58px; border-radius: var(--radius-md); border: 1.5px solid var(--red-light); background: var(--white); color: var(--text); padding: 9px 13px; font-size: 13px; resize: none; outline: none; font-family: inherit; }
.reason-save-btn { align-self: flex-end; font-size: 12px; padding: 6px 16px; border-radius: var(--radius-pill); border: none; background: var(--red); color: var(--white); cursor: pointer; font-family: inherit; font-weight: 700; }
.reason-display { font-size: 12px; color: var(--red); background: var(--red-bg); border-radius: var(--radius-md); padding: 8px 12px; margin-top: 8px; display: flex; align-items: flex-start; gap: 5px; line-height: 1.4; }

.empty-state { text-align: center; padding: 2.5rem 1rem; color: var(--text3); font-size: 14px; border: 1.5px dashed var(--sky2); border-radius: var(--radius-xl); background: var(--sky); }
.empty-state i { font-size: 32px; color: var(--navy3); display: block; margin-bottom: 8px; }

/* 과거 탭 */
.past-panel { display: flex; flex-direction: column; gap: 12px; }
.date-nav { display: flex; align-items: center; gap: 6px; background: var(--sky); border-radius: var(--radius-pill); padding: 6px 8px; }
.nav-btn { width: 34px; height: 34px; border-radius: 50%; border: none; background: var(--white); color: var(--navy); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.nav-btn:disabled { opacity: .3; }
.chip-scroll { display: flex; gap: 6px; flex: 1; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; padding: 2px 0; }
.chip-scroll::-webkit-scrollbar { display: none; }
.date-chip { font-size: 12px; padding: 5px 13px; border-radius: var(--radius-pill); border: 1.5px solid var(--sky2); background: var(--white); color: var(--navy2); cursor: pointer; white-space: nowrap; font-family: inherit; flex-shrink: 0; }
.date-chip.selected { background: var(--navy); color: var(--white); border-color: var(--navy); font-weight: 700; }

.past-day-card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius-xl); padding: 18px; }
.past-day-title { font-size: 15px; font-weight: 700; color: var(--navy); display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.past-summary-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 7px; margin-bottom: 12px; }
.ps-item { border-radius: var(--radius-md); padding: 9px 6px; text-align: center; }
.ps-item .pn { font-size: 18px; font-weight: 700; }
.ps-item .pl { font-size: 10px; margin-top: 2px; }
.ps-item.blue { background: var(--sky); } .ps-item.blue .pn { color: var(--navy); } .ps-item.blue .pl { color: var(--navy2); }
.ps-item.green { background: var(--green-bg); } .ps-item.green .pn { color: var(--green); } .ps-item.green .pl { color: #145c37; }
.ps-item.red { background: var(--red-bg); } .ps-item.red .pn { color: var(--red); } .ps-item.red .pl { color: #8a2020; }
.ps-item.gold { background: var(--gold-bg); } .ps-item.gold .pn { color: var(--gold); } .ps-item.gold .pl { color: #9a6500; }
.past-bar { height: 10px; background: var(--red-bg); border-radius: var(--radius-pill); overflow: hidden; display: flex; margin: 8px 0; }
.past-bar-done { background: var(--green); }
.past-bar-fail { background: var(--red); }
.past-bar-pend { background: var(--sky2); }
.leg-row { display: flex; gap: 12px; flex-wrap: wrap; font-size: 11px; color: var(--text2); margin-bottom: 12px; }
.leg-row span { display: flex; align-items: center; gap: 4px; }
.leg-sq { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

/* 통계 탭 */
.stats-panel { display: flex; flex-direction: column; gap: 12px; }
.stat-card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius-xl); padding: 18px; }
.stat-title { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.stat-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin-bottom: 14px; }
.sg-item { border-radius: var(--radius-lg); padding: 13px 12px; }
.sg-item .gn { font-size: 24px; font-weight: 700; }
.sg-item .gl { font-size: 11px; margin-top: 3px; }
.sg-item.blue { background: var(--sky); } .sg-item.blue .gn { color: var(--navy); } .sg-item.blue .gl { color: var(--navy2); }
.sg-item.green { background: var(--green-bg); } .sg-item.green .gn { color: var(--green); } .sg-item.green .gl { color: #145c37; }
.sg-item.gold { background: var(--gold-bg); } .sg-item.gold .gn { color: var(--gold); } .sg-item.gold .gl { color: #9a6500; }
.sg-item.red { background: var(--red-bg); } .sg-item.red .gn { color: var(--red); } .sg-item.red .gl { color: #8a2020; }
.big-bar-wrap { margin-bottom: 8px; }
.big-bar-labels { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; font-weight: 600; }
.big-bar-done-lbl { color: var(--green); }
.big-bar-fail-lbl { color: var(--red); }
.big-bar-track { height: 24px; background: var(--red-bg); border-radius: var(--radius-pill); overflow: hidden; display: flex; }
.big-bar-done { background: var(--green); border-radius: var(--radius-pill) 0 0 var(--radius-pill); display: flex; align-items: center; justify-content: center; }
.big-bar-done.full { border-radius: var(--radius-pill); }
.big-bar-fail { background: var(--red); flex: 1; border-radius: 0 var(--radius-pill) var(--radius-pill) 0; }
.big-bar-pct { font-size: 11px; color: var(--white); font-weight: 700; padding: 0 8px; white-space: nowrap; }
.type-breakdown { display: flex; flex-direction: column; gap: 8px; }
.tb-row { display: flex; align-items: center; gap: 10px; }
.tb-label { font-size: 12px; width: 54px; flex-shrink: 0; color: var(--text2); font-weight: 600; }
.tb-bar { flex: 1; height: 10px; background: var(--gray-bg); border-radius: var(--radius-pill); overflow: hidden; }
.tb-fill { height: 100%; border-radius: var(--radius-pill); }
.tb-count { font-size: 12px; color: var(--text3); width: 30px; text-align: right; flex-shrink: 0; }

.no-data { text-align: center; padding: 2.5rem; color: var(--text3); font-size: 14px; border: 1.5px dashed var(--border); border-radius: var(--radius-xl); }
.edit-input { height:42px; border-radius:99px; border:1.5px solid var(--border); background:var(--gray-bg); color:var(--text); padding:0 14px; font-size:14px; outline:none; font-family:inherit; width:100%; }
.edit-input:focus { border-color:var(--navy3); background:#fff; }
.no-data i { font-size: 28px; display: block; margin-bottom: 8px; }

.panel { display: none; }
.panel.active { display: block; }

/* ── 캘린더 ── */
.cal-wrap { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius-xl); padding: 16px; margin-bottom: 13px; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.cal-nav-btn { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--gray-bg); color: var(--navy); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 17px; }
.cal-nav-btn:active { background: var(--sky); }
.cal-month-label { font-size: 17px; font-weight: 700; color: var(--navy); }
.cal-week-header { display: grid; grid-template-columns: repeat(7,1fr); margin-bottom: 6px; }
.cal-week-header span { text-align: center; font-size: 11px; font-weight: 700; color: var(--text3); padding: 4px 0; }
.cal-week-header span:first-child { color: #e05555; }
.cal-week-header span:last-child { color: #4488cc; }
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
.cal-cell { border-radius: 12px; padding: 5px 3px 6px; cursor: pointer; min-height: 52px; display: flex; flex-direction: column; align-items: center; gap: 3px; position: relative; }
.cal-cell:active { background: var(--sky); }
.cal-cell.other-month { opacity: .3; pointer-events: none; }
.cal-cell.today .cal-day-num { background: var(--navy); color: var(--white); border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; }
.cal-cell.selected { background: var(--sky); }
.cal-cell.selected .cal-day-num { background: var(--navy); color: var(--white); border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; }
.cal-day-num { font-size: 13px; font-weight: 600; color: var(--text); width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; }
.cal-cell.sunday .cal-day-num { color: #e05555; }
.cal-cell.saturday .cal-day-num { color: #4488cc; }
.cal-cell.today.sunday .cal-day-num,
.cal-cell.selected.sunday .cal-day-num { background: #e05555; color: var(--white); border-radius: 50%; }
.cal-cell.today.saturday .cal-day-num,
.cal-cell.selected.saturday .cal-day-num { background: #4488cc; color: var(--white); border-radius: 50%; }
.cal-dots { display: flex; gap: 2px; flex-wrap: wrap; justify-content: center; max-width: 36px; }
.cal-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.cal-dot.call { background: #254d7a; }
.cal-dot.meet { background: #c8860a; }
.cal-dot.contract { background: #1a7a4a; }
.cal-dot.followup { background: #9b59b6; }

.cal-day-panel { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius-xl); padding: 16px; margin-bottom: 13px; }
.cal-day-panel-title { font-size: 15px; font-weight: 700; color: var(--navy); display: flex; align-items: center; gap: 8px; margin-bottom: 13px; }

</style>
</head>
<body>

<div id="loading-overlay">
  <i class="ti ti-briefcase lo-icon"></i>
  <div class="lo-text">영업 다이어리 로딩 중...</div>
</div>

<div class="wrap">
  <div class="sync-bar syncing" id="sync-bar">
    <div class="sync-dot"></div>
    <span id="sync-text">연결 중...</span>
  </div>

  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-date" id="date-label"></div>
        <div class="header-title"><i class="ti ti-briefcase"></i> 영업 다이어리</div>
      </div>
      <div class="header-badge" id="today-goal-badge">오늘 0건</div>
    </div>
    <div class="tab-btns">
      <button class="tab-btn active" id="tab-cal" onclick="switchTab('cal')">
        <i class="ti ti-calendar" style="font-size:13px"></i> 캘린더
      </button>
      <button class="tab-btn" id="tab-today" onclick="switchTab('today')">
        <i class="ti ti-calendar-today" style="font-size:13px"></i> 오늘
      </button>
      <button class="tab-btn" id="tab-past" onclick="switchTab('past')">
        <i class="ti ti-history" style="font-size:13px"></i> 과거
      </button>
      <button class="tab-btn" id="tab-stats" onclick="switchTab('stats')">
        <i class="ti ti-chart-bar" style="font-size:13px"></i> 통계
      </button>
    </div>
  </div>

  <!-- 오늘 탭 -->
  <!-- 캘린더 탭 -->
  <div id="panel-cal" class="panel active">
    <div class="cal-wrap">
      <div class="cal-nav">
        <button class="cal-nav-btn" onclick="calPrevMonth()"><i class="ti ti-chevron-left"></i></button>
        <div class="cal-month-label" id="cal-month-label"></div>
        <button class="cal-nav-btn" onclick="calNextMonth()"><i class="ti ti-chevron-right"></i></button>
      </div>
      <div class="cal-week-header">
        <span>일</span><span>월</span><span>화</span><span>수</span><span>목</span><span>금</span><span>토</span>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div class="cal-day-panel" id="cal-day-panel" style="display:none;"></div>
  </div>

  <div id="panel-today" class="panel">
    <div class="kpi-row">
      <div class="kpi blue"><div class="kn" id="kpi-total">0</div><div class="kl">전체</div></div>
      <div class="kpi gold"><div class="kn" id="kpi-pend">0</div><div class="kl">예정</div></div>

function setSyncStatus(s) {
  const bar = document.getElementById('sync-bar');

  bar.className = 'sync-bar ' + s;
  txt.textContent = s === 'synced' ? '동기화 완료' : s === 'syncing' ? '동기화 중...' : '오프라인';
}

const dataRef = ref(db, 'insurance_crm');
onValue(dataRef, snap => {
  allData = snap.val() || {};
  if (!allData[todayKey]) allData[todayKey] = [];
  document.getElementById('loading-overlay').classList.add('hidden');
  setSyncStatus('synced');
  if (currentTab === 'cal') renderCalendar();
  else if (currentTab === 'today') renderToday();
  else if (currentTab === 'past') renderPast();
  else renderStats();
}, () => { setSyncStatus('offline'); document.getElementById('loading-overlay').classList.add('hidden'); });

async function persist() {
  setSyncStatus('syncing');
  try { await set(dataRef, allData); setSyncStatus('synced'); }
  catch(e) { setSyncStatus('offline'); }
}

function getActivities() { return allData[todayKey] || []; }

let editType = 'call';

window.openEdit = function(id) {
  const acts = getActivities();
  const a = acts.find(a => a.id === id);
  if (!a) return;
  editType = a.type;
  document.getElementById('edit-id').value = id;
  document.getElementById('edit-name').value    = a.name    || '';
  document.getElementById('edit-phone').value   = a.phone   || '';
  document.getElementById('edit-birth').value   = a.birth   || '';
  const _parts = (a.address || '').split(' ');
  const _eSido = SIDO_LIST.find(s => _parts[0] === s) || '';
  const _eSigungu = _eSido && SIGUNGU[_eSido] ? (SIGUNGU[_eSido].find(s => _parts[1] === s) || '') : '';
  const _eDetail = _parts.slice(_eSido ? (_eSigungu ? 2 : 1) : 0).join(' ');
  document.getElementById('edit-sido').value = _eSido;
  document.getElementById('edit-sigungu').innerHTML = buildSigunguOptions(_eSido);
  document.getElementById('edit-sigungu').disabled = !_eSido;
  document.getElementById('edit-sigungu').style.opacity = _eSido ? '1' : '.6';
  if (_eSigungu) document.getElementById('edit-sigungu').value = _eSigungu;
  document.getElementById('edit-address').value = _eDetail;
  document.getElementById('edit-product').value = a.product || '';
  document.getElementById('edit-time').value    = a.time    || '';
  document.getElementById('edit-memo').value    = a.memo    || '';

  calcEditAge();
  document.getElementById('edit-overlay').style.display = '';
};

window.saveEdit = async function() {
  const rawId = document.getElementById('edit-id').value;
  const isCalEdit = rawId.includes('|');
  const id = parseInt(isCalEdit ? rawId.split('|')[0] : rawId);
  const editKey = isCalEdit ? rawId.split('|')[1] : null;
  const acts = isCalEdit ? (allData[editKey]||[]) : getActivities();
  const a = acts.find(a => a.id === id);
  if (!a) return;
  a.type    = editType;
  a.name    = document.getElementById('edit-name').value.trim();
  a.phone   = document.getElementById('edit-phone').value.trim();
  a.birth   = document.getElementById('edit-birth').value.trim();
  const _eS = document.getElementById('edit-sido').value;
  const _eSg = document.getElementById('edit-sigungu').value;
  const _eD = document.getElementById('edit-address').value.trim();
  a.address = [_eS, _eSg, _eD].filter(Boolean).join(' ');
  a.product = document.getElementById('edit-product').value.trim();
  a.time    = document.getElementById('edit-time').value.trim();
  a.memo    = document.getElementById('edit-memo').value.trim();
  if (!a.name) { alert('고객명을 입력해주세요.'); return; }
  if (isCalEdit) {
    allData[editKey] = acts;
  } else {
    setActivities(acts);
    renderToday();

  closeEdit();
  if (isCalEdit && calSelectedKey) renderCalDayPanel(calSelectedKey);
  if (isCalEdit) renderCalendar();
  await persist();
};

function calcAgeFromDigits(digits, dispEl) {
  if (digits.length < 8) { dispEl.textContent = ''; return; }
  const y = parseInt(digits.slice(0,4)), m = parseInt(digits.slice(4,6))-1, d = parseInt(digits.slice(6,8));
  if (isNaN(y)||isNaN(m)||isNaN(d)||m<0||m>11||d<1||d>31) { dispEl.textContent = ''; return; }
  const today = new Date();
  let age = today.getFullYear() - y;
  if (today.getMonth() < m || (today.getMonth() === m && today.getDate() < d)) age--;
  if (age < 0 || age > 120) { dispEl.textContent = ''; return; }
  dispEl.textContent = age + '세';
}

window.formatPhone = function(el) {
  const digits = el.value.replace(/[^0-9]/g, '').slice(0, 11);
  let formatted = digits;
  if (digits.length <= 3) {
    formatted = digits;
  } else if (digits.startsWith('02')) {
    if (digits.length <= 6) formatted = digits.slice(0,2) + '-' + digits.slice(2);
    else if (digits.length <= 9) formatted = digits.slice(0,2) + '-' + digits.slice(2,6) + '-' + digits.slice(6);
    else formatted = digits.slice(0,2) + '-' + digits.slice(2,6) + '-' + digits.slice(6);
  } else {
    if (digits.length <= 6) formatted = digits.slice(0,3) + '-' + digits.slice(3);
    else if (digits.length <= 10) formatted = digits.slice(0,3) + '-' + digits.slice(3,6) + '-' + digits.slice(6);
    else formatted = digits.slice(0,3) + '-' + digits.slice(3,7) + '-' + digits.slice(7);
  }
  el.value = formatted;
};

window.formatBirth = function(el, isEdit, customDispId) {
  const digits = el.value.replace(/[^0-9]/g, '').slice(0, 8);
  let formatted = digits;
  if (digits.length <= 4) {
    formatted = digits;
  } else if (digits.length <= 6) {
    formatted = digits.slice(0,4) + '-' + digits.slice(4);
  } else {
    formatted = digits.slice(0,4) + '-' + digits.slice(4,6) + '-' + digits.slice(6);
  }
  el.value = formatted;
  const dispId = customDispId || (isEdit ? 'edit-age-disp' : 'age-display');
  const dispEl = document.getElementById(dispId);
  if (dispEl) calcAgeFromDigits(digits, dispEl);
};

window.markDone = async function(id) {
  const acts = getActivities();
  const a = acts.find(a => a.id === id); if (!a) return;
  a.status = 'done'; a.reason = '';
  if (showReasonFor === id) showReasonFor = null;
  setActivities(acts); renderToday(); await persist();
};
window.markFail = function(id) {
  showReasonFor = showReasonFor === id ? null : id;
  renderToday();
};
window.saveReason = async function(id) {
  const el = document.getElementById('reason-' + id);
  const acts = getActivities();
  const a = acts.find(a => a.id === id); if (!a) return;
  a.status = 'failed'; a.reason = (el?.value || '').trim() || '이유 없음';
  showReasonFor = null; setActivities(acts); renderToday(); await persist();
};
window.undoActivity = async function(id) {
  const acts = getActivities();
  const a = acts.find(a => a.id === id); if (!a) return;
  a.status = 'pending'; a.reason = '';
  setActivities(acts); renderToday(); await persist();
};
window.deleteActivity = async function(id) {
  setActivities(getActivities().filter(a => a.id !== id));
  if (showReasonFor === id) showReasonFor = null;
  renderToday(); await persist();
};

          { label:'완료', data:chartDone, backgroundColor:'#1a7a4a', borderRadius:6, borderSkipped:false },
          { label:'무산', data:chartFail, backgroundColor:'#b03030', borderRadius:6, borderSkipped:false },
          { label:'예정', data:chartPend, backgroundColor:'#90bfe8', borderRadius:6, borderSkipped:false }
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ display:false } },
        scales:{
          x:{ stacked:true, grid:{display:false}, ticks:{color:'#8a95a3',font:{size:10},autoSkip:false,maxRotation:45} },
          y:{ stacked:true, grid:{color:'rgba(0,0,0,0.05)'}, ticks:{color:'#8a95a3',font:{size:10},stepSize:1}, beginAtZero:true }
        }
      }
    });
  }, 100);
}

// ── 캘린더 ───────────────────────────────
let calYear = new Date().getFullYear();
let calMonth = new Date().getMonth(); // 0-based
let calSelectedKey = null;

const MONTH_NAMES = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

function dateKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function renderCalendar() {
  const today = new Date();
  const todayKey2 = dateKey(today.getFullYear(), today.getMonth(), today.getDate());

  document.getElementById('cal-month-label').textContent =
    `${calYear}년 ${MONTH_NAMES[calMonth]}`;

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const lastDate = new Date(calYear, calMonth + 1, 0).getDate();
  const prevLastDate = new Date(calYear, calMonth, 0).getDate();

  const grid = document.getElementById('cal-grid');
  let cells = '';

  // 이전 달 빈 칸
  for (let i = 0; i < firstDay; i++) {
    const d = prevLastDate - firstDay + 1 + i;
    cells += `<div class="cal-cell other-month"><div class="cal-day-num">${d}</div></div>`;
  }

  // 이번 달
  for (let d = 1; d <= lastDate; d++) {
    const key = dateKey(calYear, calMonth, d);
    const dayOfWeek = new Date(calYear, calMonth, d).getDay();
    const acts = allData[key] || [];
    const isToday = key === todayKey2;
    const isSelected = key === calSelectedKey;

    let cls = 'cal-cell';
    if (isToday) cls += ' today';
    if (isSelected) cls += ' selected';
    if (dayOfWeek === 0) cls += ' sunday';
    if (dayOfWeek === 6) cls += ' saturday';

    // 유형별 점 (중복 제거, 최대 4개)
    const types = [...new Set(acts.map(a => a.type))].slice(0, 4);
    const dots = types.map(t => `<div class="cal-dot ${t}"></div>`).join('');

    cells += `<div class="${cls}" onclick="calSelectDay('${key}')">
      <div class="cal-day-num">${d}</div>
      ${dots ? `<div class="cal-dots">${dots}</div>` : ''}
    </div>`;
  }

  // 다음 달 빈 칸
  const totalCells = firstDay + lastDate;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let i = 1; i <= remaining; i++) {
    cells += `<div class="cal-cell other-month"><div class="cal-day-num">${i}</div></div>`;
  }

  grid.innerHTML = cells;

  // 선택된 날 패널 렌더링
  if (calSelectedKey) renderCalDayPanel(calSelectedKey);
}

window.calPrevMonth = function() {
  if (calMonth === 0) { calYear--; calMonth = 11; } else { calMonth--; }
  renderCalendar();
};
window.calNextMonth = function() {
  if (calMonth === 11) { calYear++; calMonth = 0; } else { calMonth++; }
  renderCalendar();
};

window.calSelectDay = function(key) {
  calSelectedKey = key;
  renderCalendar();
};

function renderCalDayPanel(key) {
  const panel = document.getElementById('cal-day-panel');

  const today = new Date();
  const todayKey2 = dateKey(today.getFullYear(), today.getMonth(), today.getDate());
  const isFuture = key >= todayKey2;

  if (!allData[key]) allData[key] = [];
  const acts = allData[key];

  // 활동 추가 폼 (미래/오늘만)

    <div id="cal-add-form-wrap">

        <i class="ti ti-chevron-down" id="cal-form-arrow" style="font-size:16px;color:var(--navy3);transition:transform 0.25s;transform:rotate(-90deg);"></i>

        <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;" id="cal-type-btns">

          <button class="type-btn" data-type="meet" onclick="setCalType('meet')"><i class="ti ti-users"></i> 미팅</button>
          <button class="type-btn" data-type="contract" onclick="setCalType('contract')"><i class="ti ti-file-text"></i> 계약</button>
          <button class="type-btn" data-type="followup" onclick="setCalType('followup')"><i class="ti ti-refresh"></i> 팔로업</button>
        </div>
        <div style="display:flex;flex-direction:column;gap:7px;">
          <input type="text" id="cal-input-name" placeholder="고객명" maxlength="20" style="height:42px;border-radius:99px;border:1.5px solid var(--border);background:var(--gray-bg);color:var(--text);padding:0 14px;font-size:14px;outline:none;font-family:inherit;width:100%;" />
          <input type="text" id="cal-input-phone" placeholder="연락처 (선택)" maxlength="13" oninput="formatPhone(this)" inputmode="numeric" style="height:42px;border-radius:99px;border:1.5px solid var(--border);background:var(--gray-bg);color:var(--text);padding:0 14px;font-size:14px;outline:none;font-family:inherit;width:100%;" />
          <div style="display:flex;gap:8px;">
            <input type="text" id="cal-input-birth" placeholder="생년월일 (선택)" maxlength="10" oninput="formatBirth(this, false, 'cal-age-disp')" inputmode="numeric" style="flex:1;height:42px;border-radius:99px;border:1.5px solid var(--border);background:var(--gray-bg);color:var(--text);padding:0 14px;font-size:14px;outline:none;font-family:inherit;" />
            <div id="cal-age-disp" style="display:flex;align-items:center;justify-content:center;min-width:60px;height:42px;border-radius:99px;background:var(--gold-bg);color:var(--gold);font-size:14px;font-weight:700;border:1.5px solid var(--gold-light);padding:0 10px;white-space:nowrap;flex-shrink:0;"></div>
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;">
            <div style="display:flex;gap:6px;">
              <select id="cal-input-sido" style="flex:1;height:42px;border-radius:99px;border:1.5px solid var(--border);background:var(--gray-bg);color:var(--text);padding:0 14px;font-size:14px;outline:none;font-family:inherit;cursor:pointer;"></select>
              <select id="cal-input-sigungu" disabled style="flex:1;height:42px;border-radius:99px;border:1.5px solid var(--border);background:var(--gray-bg);color:var(--text);padding:0 14px;font-size:14px;outline:none;font-family:inherit;cursor:pointer;opacity:.6;"><option value="">시/군/구</option></select>
            </div>
            <input type="text" id="cal-input-address" placeholder="나머지 주소 (선택)" maxlength="60" style="height:42px;border-radius:99px;border:1.5px solid var(--border);background:var(--gray-bg);color:var(--text);padding:0 14px;font-size:14px;outline:none;font-family:inherit;width:100%;" />
          </div>
          <input type="text" id="cal-input-product" placeholder="보험료 / 상품명 (선택)" maxlength="20" style="height:42px;border-radius:99px;border:1.5px solid var(--border);background:var(--gray-bg);color:var(--text);padding:0 14px;font-size:14px;outline:none;font-family:inherit;width:100%;" />
          <input type="text" id="cal-input-time" placeholder="시간 (예: 오후 2시)" maxlength="20" style="height:42px;border-radius:99px;border:1.5px solid var(--border);background:var(--gray-bg);color:var(--text);padding:0 14px;font-size:14px;outline:none;font-family:inherit;width:100%;" />
          <textarea id="cal-input-memo" placeholder="메모 (선택)" maxlength="100" style="height:64px;border-radius:16px;border:1.5px solid var(--border);background:var(--gray-bg);color:var(--text);padding:10px 14px;font-size:14px;outline:none;font-family:inherit;width:100%;resize:none;"></textarea>
        </div>
        <button onclick="calAddActivity()" style="width:100%;margin-top:10px;height:44px;border-radius:99px;border:none;background:var(--navy);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;"><i class="ti ti-plus"></i> 등록</button>
      </div>
    </div>`;

  const groups = [
    { type:'call', label:'전화콜', icon:'ti-phone' },
    { type:'meet', label:'미팅', icon:'ti-users' },
    { type:'contract', label:'계약', icon:'ti-file-text' },
    { type:'followup', label:'팔로업', icon:'ti-refresh' },
  ];
  const groupColors = { call:'#254d7a', meet:'#c8860a', contract:'#1a7a4a', followup:'#9b59b6' };
  const groupBg = { call:'#e8f2fb', meet:'#fef8ec', contract:'#eaf5ef', followup:'#f3eafd' };

  const actHtml = acts.length === 0
    ? '<div style="color:var(--text3);font-size:14px;padding:1.5rem;text-align:center;border:1.5px dashed var(--border);border-radius:20px;">이 날의 활동이 없어요</div>'
    : groups.map(g => {
        const items = acts.filter(a => a.type === g.type);
        if (!items.length) return '';
        const cardsHtml = items.map(a => buildCalCard(a, key)).join('');
        return `<div style="margin-bottom:14px;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;padding:7px 13px;background:${groupBg[g.type]};border-radius:99px;">
            <i class="ti ${g.icon}" style="font-size:14px;color:${groupColors[g.type]}"></i>
            <span style="font-size:12px;font-weight:700;color:${groupColors[g.type]}">${g.label}</span>
            <span style="font-size:11px;font-weight:600;background:${groupColors[g.type]};color:#fff;padding:2px 8px;border-radius:99px;">${items.length}건</span>
          </div>
          <div style="display:flex;flex-direction:column;gap:8px;">${cardsHtml}</div>
        </div>`;
      }).join('');

  panel.innerHTML = `
    <div class="cal-day-panel-title">
      <i class="ti ti-calendar-event"></i>${dayLabel}
      <button onclick="closeCalDay()" style="margin-left:auto;border:none;background:var(--gray-bg);border-radius:50%;width:30px;height:30px;cursor:pointer;color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:16px;"><i class="ti ti-x"></i></button>
    </div>
    ${addForm}
    <div style="margin-top:12px;" id="cal-act-list">${actHtml}</div>`;

  // sido 초기화
  setTimeout(() => {
    const s = document.getElementById('cal-input-sido');
    if (s && !s.innerHTML.includes('서울')) {
      s.innerHTML = buildSidoOptions();
      s.addEventListener('change', function() { onSidoChange('cal-input-sido','cal-input-sigungu'); });
    }
  }, 0);
}

function buildCalCard(a, key) {
  const typeColor = TYPE_COLOR[a.type] || 'call';
  const statusBadge = a.status === 'done'
    ? '<span class="act-status-badge done" style="font-size:10px;padding:2px 8px"><i class="ti ti-check" style="font-size:9px"></i> 완료</span>'
    : a.status === 'failed'
    ? '<span class="act-status-badge failed" style="font-size:10px;padding:2px 8px"><i class="ti ti-x" style="font-size:9px"></i> 무산</span>'
    : '<span style="font-size:10px;padding:2px 8px;background:var(--gold-bg);color:var(--gold);border-radius:99px;font-weight:700">예정</span>';

  const birthHtml = (()=>{
    if (!a.birth) return '';
    const dg = a.birth.replace(/[^0-9]/g,'');
    if (dg.length < 8) return '';
    const y=parseInt(dg.slice(0,4)), m=parseInt(dg.slice(4,6))-1, d=parseInt(dg.slice(6,8));
    const today = new Date(); let age = today.getFullYear()-y;
    if (today.getMonth()<m||(today.getMonth()===m&&today.getDate()<d)) age--;
    if (age<0||age>120) return '';
    return `<div style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--gold);font-weight:600;"><i class="ti ti-cake" style="font-size:11px"></i>${dg.slice(0,4)}-${dg.slice(4,6)}-${dg.slice(6,8)} · ${age}세</div>`;
  })();

  let btns = '';
  if (a.status === 'pending') {
    btns = `<button class="act-btn done-btn" onclick="calMarkDone(${a.id},'${key}')"><i class="ti ti-check"></i> 완료</button>
            <button class="act-btn fail-btn" onclick="calMarkFail(${a.id},'${key}')"><i class="ti ti-x"></i> 무산</button>
            <button class="act-btn" style="border:1.5px solid var(--navy3);background:var(--sky);color:var(--navy);" onclick="openCalEdit(${a.id},'${key}')"><i class="ti ti-edit"></i> 수정</button>
            <button class="act-btn del-btn" onclick="calDeleteActivity(${a.id},'${key}')"><i class="ti ti-trash"></i></button>`;
  } else {
    btns = `<button class="act-btn undo-btn" onclick="calUndo(${a.id},'${key}')"><i class="ti ti-rotate-left"></i> 되돌리기</button>
            <button class="act-btn" style="border:1.5px solid var(--navy3);background:var(--sky);color:var(--navy);" onclick="openCalEdit(${a.id},'${key}')"><i class="ti ti-edit"></i> 수정</button>
            <button class="act-btn del-btn" onclick="calDeleteActivity(${a.id},'${key}')"><i class="ti ti-trash"></i></button>`;
  }

  return `<div class="act-card ${typeColor} ${a.status!=='pending'?'done':''}">
    <div class="act-top">
      <span class="act-type-badge ${typeColor}"><i class="ti ${TYPE_ICON[a.type]}"></i> ${TYPE_LABEL[a.type]}</span>
      <div class="act-body">
        <div class="act-name">${a.name} ${a.product?`<span style="font-size:12px;font-weight:400;color:var(--text2)">· ${a.product}</span>`:''} ${statusBadge}</div>
        ${a.phone?`<div style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);margin-top:3px;"><i class="ti ti-phone" style="font-size:11px;color:var(--navy3)"></i>${a.phone}</div>`:''}
        ${birthHtml}
        ${a.address?`<div style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2);margin-top:2px;"><i class="ti ti-map-pin" style="font-size:11px;color:#9b59b6"></i>${a.address}</div>`:''}
        ${a.time?`<div style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text3);margin-top:2px;"><i class="ti ti-clock" style="font-size:11px"></i>${a.time}</div>`:''}
        ${a.memo?`<div class="act-detail" style="margin-top:4px;">${a.memo}</div>`:''}
      </div>
    </div>
    <div class="act-status-row">${btns}</div>
    ${a.reason?`<div class="reason-display"><i class="ti ti-alert-circle" style="font-size:13px;flex-shrink:0"></i>${a.reason}</div>`:''}
  </div>`;
}

window.closeCalDay = function() {
  calSelectedKey = null;
  document.getElementById('cal-day-panel').style.display = 'none';
  renderCalendar();
};

// 캘린더 활동 유형 선택
let calType = 'call';
window.setCalType = function(type) {
  calType = type;
  document.querySelectorAll('#cal-type-btns .type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === type));
};

window.toggleCalForm = function() {
  const body = document.getElementById('cal-add-body');
  const arrow = document.getElementById('cal-form-arrow');
  if (!body) return;
  const open = body.style.display === '';
  body.style.display = open ? 'none' : '';
  arrow.style.transform = open ? 'rotate(-90deg)' : 'rotate(0deg)';
};

// 캘린더 활동 추가
window.calAddActivity = async function() {
  if (!calSelectedKey) return;
  const name = document.getElementById('cal-input-name').value.trim();
  if (!name) { alert('고객명을 입력해주세요.'); return; }
  const phone   = document.getElementById('cal-input-phone').value.trim();
  const birth   = document.getElementById('cal-input-birth').value.trim();
  const sido    = document.getElementById('cal-input-sido').value;
  const sigungu = document.getElementById('cal-input-sigungu').value;
  const addrDetail = document.getElementById('cal-input-address').value.trim();
  const address = [sido, sigungu, addrDetail].filter(Boolean).join(' ');
  const product = document.getElementById('cal-input-product').value.trim();
  const time    = document.getElementById('cal-input-time').value.trim();
  const memo    = document.getElementById('cal-input-memo').value.trim();

  if (!allData[calSelectedKey]) allData[calSelectedKey] = [];
  allData[calSelectedKey].push({ id: Date.now(), type: calType, name, phone, birth, address, product, time, memo, status:'pending', reason:'' });

  ['cal-input-name','cal-input-phone','cal-input-birth','cal-input-address','cal-input-product','cal-input-time','cal-input-memo'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  const agedisp = document.getElementById('cal-age-disp'); if (agedisp) agedisp.textContent='';
  const sg = document.getElementById('cal-input-sigungu'); if(sg){sg.innerHTML='<option value="">시/군/구</option>';sg.disabled=true;sg.style.opacity='.6';}
  const sd = document.getElementById('cal-input-sido'); if(sd) sd.value='';

  renderCalDayPanel(calSelectedKey);
  renderCalendar();
  await persist();
};

// 캘린더 상태 변경
window.calMarkDone = async function(id, key) {
  const a = (allData[key]||[]).find(a=>a.id===id); if(!a) return;
  a.status='done'; a.reason='';
  renderCalDayPanel(key); renderCalendar(); await persist();
};
window.calMarkFail = async function(id, key) {
  const a = (allData[key]||[]).find(a=>a.id===id); if(!a) return;
  a.status='failed'; a.reason='미처리';
  renderCalDayPanel(key); renderCalendar(); await persist();
};
window.calUndo = async function(id, key) {
  const a = (allData[key]||[]).find(a=>a.id===id); if(!a) return;
  a.status='pending'; a.reason='';
  renderCalDayPanel(key); renderCalendar(); await persist();
};
window.calDeleteActivity = async function(id, key) {
  allData[key] = (allData[key]||[]).filter(a=>a.id!==id);
  renderCalDayPanel(key); renderCalendar(); await persist();
};

// 캘린더 수정 (기존 edit 모달 재활용)
let calEditKey = null;
window.openCalEdit = function(id, key) {
  calEditKey = key;
  // allData[key] 기준으로 openEdit 로직 수행
  const acts = allData[key] || [];
  const a = acts.find(a=>a.id===id); if(!a) return;
  editType = a.type;
  document.getElementById('edit-id').value = id + '|' + key;
  document.getElementById('edit-name').value    = a.name    || '';
  document.getElementById('edit-phone').value   = a.phone   || '';
  document.getElementById('edit-birth').value   = a.birth   || '';
  document.getElementById('edit-address').value = a.address ? a.address.split(' ').slice(2).join(' ') : '';
  document.getElementById('edit-product').value = a.product || '';
  document.getElementById('edit-time').value    = a.time    || '';
  document.getElementById('edit-memo').value    = a.memo    || '';
  // sido/sigungu 복원
  const parts = (a.address||'').split(' ');
  const eSido = SIDO_LIST.find(s=>parts[0]===s)||'';
  const eSigungu = eSido&&SIGUNGU[eSido]?(SIGUNGU[eSido].find(s=>parts[1]===s)||''):'';
  const eDetail = parts.slice(eSido?(eSigungu?2:1):0).join(' ');
  document.getElementById('edit-sido').value = eSido;
  document.getElementById('edit-sigungu').innerHTML = buildSigunguOptions(eSido);
  document.getElementById('edit-sigungu').disabled = !eSido;
  document.getElementById('edit-sigungu').style.opacity = eSido?'1':'.6';
  if(eSigungu) document.getElementById('edit-sigungu').value = eSigungu;
  document.getElementById('edit-address').value = eDetail;
  document.getElementById('edit-birth-row').style.display = '';
  calcEditAge();
  document.querySelectorAll('#edit-type-btns .type-btn').forEach(b=>b.classList.toggle('active',b.dataset.type===editType));
  document.getElementById('edit-overlay').style.display = '';
};

window.switchTab = function(tab) {
  currentTab = tab;
  ['cal','today','past','stats'].forEach(t => {
    document.getElementById('panel-' + t).classList.toggle('active', t === tab);
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
  if (tab === 'cal') renderCalendar();
  if (tab === 'past') renderPast();
  if (tab === 'stats') renderStats();
};

// 시/도 선택 초기화
document.getElementById('input-sido').innerHTML = buildSidoOptions();
document.getElementById('edit-sido').innerHTML = buildSidoOptions();

document.getElementById('input-sido').addEventListener('change', function() {
  onSidoChange('input-sido', 'input-sigungu');
});
document.getElementById('edit-sido').addEventListener('change', function() {
  onSidoChange('edit-sido', 'edit-sigungu');
});
