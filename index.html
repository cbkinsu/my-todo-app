<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a3a5c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>영업 다이어리</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --navy: #1a3a5c;
  --navy2: #254d7a;
  --navy3: #2d6199;
  --sky: #e8f2fb;
  --sky2: #c5ddf5;
  --sky3: #90bfe8;
  --gold: #c8860a;
  --gold-bg: #fef8ec;
  --gold-light: #fdebc6;
  --green: #1a7a4a;
  --green-bg: #eaf5ef;
  --green-light: #b8e0ca;
  --red: #b03030;
  --red-bg: #fceaea;
  --red-light: #f0b8b8;
  --gray: #4a5568;
  --gray-bg: #f4f6f9;
  --border: #dde3ec;
  --text: #1a2535;
  --text2: #4a5568;
  --text3: #8a95a3;
  --white: #ffffff;
  --radius-xl: 24px;
  --radius-lg: 18px;
  --radius-md: 12px;
  --radius-pill: 99px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--gray-bg); font-family: -apple-system, 'Noto Sans KR', sans-serif; color: var(--text); }

/* 로딩 */
#loading-overlay { position: fixed; inset: 0; background: var(--navy); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; z-index: 999; }
#loading-overlay.hidden { display: none; }
.lo-icon { font-size: 52px; color: var(--sky); }
.lo-text { font-size: 15px; color: var(--sky2); }

.wrap { max-width: 480px; margin: 0 auto; padding: 14px 13px 100px; }

/* 동기화 */
.sync-bar { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; padding: 4px 12px; border-radius: var(--radius-pill); margin-bottom: 10px; }
.sync-bar.synced { background: var(--green-bg); color: var(--green); }
.sync-bar.syncing { background: var(--sky); color: var(--navy2); }
.sync-bar.offline { background: var(--red-bg); color: var(--red); }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.sync-bar.synced .sync-dot { background: var(--green); }
.sync-bar.syncing .sync-dot { background: var(--navy3); animation: blink 1s infinite; }
.sync-bar.offline .sync-dot { background: var(--red); }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* 헤더 */
.header { background: var(--navy); border-radius: var(--radius-xl); padding: 18px 20px 14px; margin-bottom: 13px; }
.header-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; }
.header-date { font-size: 12px; color: var(--sky3); margin-bottom: 3px; }
.header-title { font-size: 20px; font-weight: 700; color: var(--white); display: flex; align-items: center; gap: 8px; }
.header-badge { background: var(--gold-bg); color: var(--gold); font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: var(--radius-pill); border: 1px solid var(--gold-light); white-space: nowrap; margin-top: 4px; }

.tab-btns { display: flex; gap: 5px; }
.tab-btn { flex: 1; font-size: 12px; padding: 8px 4px; border-radius: var(--radius-pill); border: 1.5px solid #3a5a7a; background: transparent; color: var(--sky3); cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 4px; }
.tab-btn.active { background: var(--white); color: var(--navy); border-color: var(--white); font-weight: 700; }

/* KPI 카드 */
.kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; margin-bottom: 13px; }
.kpi { border-radius: var(--radius-lg); padding: 11px 8px; text-align: center; }
.kpi .kn { font-size: 22px; font-weight: 700; }
.kpi .kl { font-size: 10px; margin-top: 2px; font-weight: 500; }
.kpi.blue { background: var(--sky); } .kpi.blue .kn { color: var(--navy); } .kpi.blue .kl { color: var(--navy2); }
.kpi.gold { background: var(--gold-bg); } .kpi.gold .kn { color: var(--gold); } .kpi.gold .kl { color: #9a6500; }
.kpi.green { background: var(--green-bg); } .kpi.green .kn { color: var(--green); } .kpi.green .kl { color: #145c37; }
.kpi.red { background: var(--red-bg); } .kpi.red .kn { color: var(--red); } .kpi.red .kl { color: #8a2020; }

/* 섹션 라벨 */
.section-lbl { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }

/* 활동 추가 폼 */
.add-card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius-xl); padding: 16px; margin-bottom: 13px; }
.add-card-title { font-size: 14px; font-weight: 700; color: var(--navy); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.form-row { display: flex; gap: 8px; margin-bottom: 8px; }
.form-row input, .form-row select, .form-row textarea { flex: 1; border: 1.5px solid var(--border); border-radius: var(--radius-pill); background: var(--gray-bg); color: var(--text); padding: 0 14px; font-size: 14px; outline: none; font-family: inherit; height: 42px; }
.form-row select { cursor: pointer; }
.form-row textarea { height: 70px; border-radius: var(--radius-md); padding: 10px 14px; resize: none; line-height: 1.4; }
.form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: var(--navy3); background: var(--white); }
.type-btns { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
.type-btn { font-size: 12px; padding: 6px 13px; border-radius: var(--radius-pill); border: 1.5px solid var(--border); background: var(--gray-bg); color: var(--text2); cursor: pointer; font-family: inherit; display: flex; align-items: center; gap: 4px; }
.type-btn.active { border-color: var(--navy); background: var(--navy); color: var(--white); font-weight: 600; }
.submit-btn { width: 100%; height: 44px; border-radius: var(--radius-pill); border: none; background: var(--navy); color: var(--white); font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 6px; margin-top: 4px; }
.submit-btn:active { background: var(--navy2); transform: scale(.98); }

/* 활동 카드 */
.activity-list { display: flex; flex-direction: column; gap: 9px; }
.act-card { background: var(--white); border-radius: var(--radius-lg); border: 1.5px solid var(--border); padding: 14px 15px; border-left: 4px solid var(--border); }
.act-card.call { border-left-color: var(--navy3); }
.act-card.meet { border-left-color: var(--gold); }
.act-card.contract { border-left-color: var(--green); }
.act-card.followup { border-left-color: #9b59b6; }
.act-card.done { opacity: .7; }
.act-top { display: flex; align-items: flex-start; gap: 10px; }
.act-type-badge { font-size: 10px; font-weight: 700; padding: 3px 9px; border-radius: var(--radius-pill); white-space: nowrap; flex-shrink: 0; margin-top: 1px; }
.act-type-badge.call { background: var(--sky); color: var(--navy); }
.act-type-badge.meet { background: var(--gold-bg); color: var(--gold); }
.act-type-badge.contract { background: var(--green-bg); color: var(--green); }
.act-type-badge.followup { background: #f3eafd; color: #6c2fa0; }
.act-body { flex: 1; }
.act-name { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.act-card.done .act-name { text-decoration: line-through; color: var(--text3); }
.act-detail { font-size: 12px; color: var(--text2); margin-bottom: 4px; line-height: 1.4; }
.act-meta { display: flex; gap: 8px; flex-wrap: wrap; }
.act-tag { font-size: 11px; padding: 2px 8px; border-radius: var(--radius-pill); background: var(--gray-bg); color: var(--text3); display: flex; align-items: center; gap: 3px; }
.act-status-row { display: flex; gap: 6px; margin-top: 10px; align-items: center; flex-wrap: wrap; }
.act-btn { font-size: 12px; padding: 6px 13px; border-radius: var(--radius-pill); cursor: pointer; display: flex; align-items: center; gap: 4px; font-family: inherit; border: 1.5px solid var(--border); background: var(--gray-bg); color: var(--text2); }
.act-btn.done-btn { border-color: var(--green); background: var(--green-bg); color: var(--green); font-weight: 600; }
.act-btn.done-btn:active { background: var(--green-light); }
.act-btn.fail-btn { border-color: var(--red); background: var(--red-bg); color: var(--red); font-weight: 600; }
.act-btn.fail-btn:active { background: var(--red-light); }
.act-btn.del-btn:active { background: var(--red-bg); border-color: var(--red-light); color: var(--red); }
.act-btn.undo-btn { color: var(--navy3); border-color: var(--sky2); background: var(--sky); }
.act-status-badge { font-size: 11px; font-weight: 700; padding: 4px 11px; border-radius: var(--radius-pill); }
.act-status-badge.done { background: var(--green); color: var(--white); }
.act-status-badge.failed { background: var(--red); color: var(--white); }
.reason-box { margin-top: 9px; display: flex; flex-direction: column; gap: 6px; }
.reason-input { width: 100%; height: 58px; border-radius: var(--radius-md); border: 1.5px solid var(--red-light); background: var(--white); color: var(--text); padding: 9px 13px; font-size: 13px; resize: none; outline: none; font-family: inherit; }
.reason-save-btn { align-self: flex-end; font-size: 12px; padding: 6px 16px; border-radius: var(--radius-pill); border: none; background: var(--red); color: var(--white); cursor: pointer; font-family: inherit; font-weight: 700; }
.reason-display { font-size: 12px; color: var(--red); background: var(--red-bg); border-radius: var(--radius-md); padding: 8px 12px; margin-top: 8px; display: flex; align-items: flex-start; gap: 5px; line-height: 1.4; }

.empty-state { text-align: center; padding: 2.5rem 1rem; color: var(--text3); font-size: 14px; border: 1.5px dashed var(--sky2); border-radius: var(--radius-xl); background: var(--sky); }
.empty-state i { font-size: 32px; color: var(--navy3); display: block; margin-bottom: 8px; }

/* 과거 탭 */
.past-panel { display: flex; flex-direction: column; gap: 12px; }
.date-nav { display: flex; align-items: center; gap: 6px; background: var(--sky); border-radius: var(--radius-pill); padding: 6px 8px; }
.nav-btn { width: 34px; height: 34px; border-radius: 50%; border: none; background: var(--white); color: var(--navy); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.nav-btn:disabled { opacity: .3; }
.chip-scroll { display: flex; gap: 6px; flex: 1; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; padding: 2px 0; }
.chip-scroll::-webkit-scrollbar { display: none; }
.date-chip { font-size: 12px; padding: 5px 13px; border-radius: var(--radius-pill); border: 1.5px solid var(--sky2); background: var(--white); color: var(--navy2); cursor: pointer; white-space: nowrap; font-family: inherit; flex-shrink: 0; }
.date-chip.selected { background: var(--navy); color: var(--white); border-color: var(--navy); font-weight: 700; }

.past-day-card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius-xl); padding: 18px; }
.past-day-title { font-size: 15px; font-weight: 700; color: var(--navy); display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
.past-summary-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 7px; margin-bottom: 12px; }
.ps-item { border-radius: var(--radius-md); padding: 9px 6px; text-align: center; }
.ps-item .pn { font-size: 18px; font-weight: 700; }
.ps-item .pl { font-size: 10px; margin-top: 2px; }
.ps-item.blue { background: var(--sky); } .ps-item.blue .pn { color: var(--navy); } .ps-item.blue .pl { color: var(--navy2); }
.ps-item.green { background: var(--green-bg); } .ps-item.green .pn { color: var(--green); } .ps-item.green .pl { color: #145c37; }
.ps-item.red { background: var(--red-bg); } .ps-item.red .pn { color: var(--red); } .ps-item.red .pl { color: #8a2020; }
.ps-item.gold { background: var(--gold-bg); } .ps-item.gold .pn { color: var(--gold); } .ps-item.gold .pl { color: #9a6500; }
.past-bar { height: 10px; background: var(--red-bg); border-radius: var(--radius-pill); overflow: hidden; display: flex; margin: 8px 0; }
.past-bar-done { background: var(--green); }
.past-bar-fail { background: var(--red); }
.past-bar-pend { background: var(--sky2); }
.leg-row { display: flex; gap: 12px; flex-wrap: wrap; font-size: 11px; color: var(--text2); margin-bottom: 12px; }
.leg-row span { display: flex; align-items: center; gap: 4px; }
.leg-sq { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

/* 통계 탭 */
.stats-panel { display: flex; flex-direction: column; gap: 12px; }
.stat-card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius-xl); padding: 18px; }
.stat-title { font-size: 15px; font-weight: 700; color: var(--navy); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
.stat-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; margin-bottom: 14px; }
.sg-item { border-radius: var(--radius-lg); padding: 13px 12px; }
.sg-item .gn { font-size: 24px; font-weight: 700; }
.sg-item .gl { font-size: 11px; margin-top: 3px; }
.sg-item.blue { background: var(--sky); } .sg-item.blue .gn { color: var(--navy); } .sg-item.blue .gl { color: var(--navy2); }
.sg-item.green { background: var(--green-bg); } .sg-item.green .gn { color: var(--green); } .sg-item.green .gl { color: #145c37; }
.sg-item.gold { background: var(--gold-bg); } .sg-item.gold .gn { color: var(--gold); } .sg-item.gold .gl { color: #9a6500; }
.sg-item.red { background: var(--red-bg); } .sg-item.red .gn { color: var(--red); } .sg-item.red .gl { color: #8a2020; }
.big-bar-wrap { margin-bottom: 8px; }
.big-bar-labels { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 5px; font-weight: 600; }
.big-bar-done-lbl { color: var(--green); }
.big-bar-fail-lbl { color: var(--red); }
.big-bar-track { height: 24px; background: var(--red-bg); border-radius: var(--radius-pill); overflow: hidden; display: flex; }
.big-bar-done { background: var(--green); border-radius: var(--radius-pill) 0 0 var(--radius-pill); display: flex; align-items: center; justify-content: center; }
.big-bar-done.full { border-radius: var(--radius-pill); }
.big-bar-fail { background: var(--red); flex: 1; border-radius: 0 var(--radius-pill) var(--radius-pill) 0; }
.big-bar-pct { font-size: 11px; color: var(--white); font-weight: 700; padding: 0 8px; white-space: nowrap; }
.type-breakdown { display: flex; flex-direction: column; gap: 8px; }
.tb-row { display: flex; align-items: center; gap: 10px; }
.tb-label { font-size: 12px; width: 54px; flex-shrink: 0; color: var(--text2); font-weight: 600; }
.tb-bar { flex: 1; height: 10px; background: var(--gray-bg); border-radius: var(--radius-pill); overflow: hidden; }
.tb-fill { height: 100%; border-radius: var(--radius-pill); }
.tb-count { font-size: 12px; color: var(--text3); width: 30px; text-align: right; flex-shrink: 0; }

.no-data { text-align: center; padding: 2.5rem; color: var(--text3); font-size: 14px; border: 1.5px dashed var(--border); border-radius: var(--radius-xl); }
.no-data i { font-size: 28px; display: block; margin-bottom: 8px; }

.panel { display: none; }
.panel.active { display: block; }
</style>
</head>
<body>

<div id="loading-overlay">
  <i class="ti ti-briefcase lo-icon"></i>
  <div class="lo-text">영업 다이어리 로딩 중...</div>
</div>

<div class="wrap">
  <div class="sync-bar syncing" id="sync-bar">
    <div class="sync-dot"></div>
    <span id="sync-text">연결 중...</span>
  </div>

  <div class="header">
    <div class="header-top">
      <div>
        <div class="header-date" id="date-label"></div>
        <div class="header-title"><i class="ti ti-briefcase"></i> 영업 다이어리</div>
      </div>
      <div class="header-badge" id="today-goal-badge">오늘 0건</div>
    </div>
    <div class="tab-btns">
      <button class="tab-btn active" id="tab-today" onclick="switchTab('today')">
        <i class="ti ti-calendar-today" style="font-size:13px"></i> 오늘
      </button>
      <button class="tab-btn" id="tab-past" onclick="switchTab('past')">
        <i class="ti ti-history" style="font-size:13px"></i> 과거
      </button>
      <button class="tab-btn" id="tab-stats" onclick="switchTab('stats')">
        <i class="ti ti-chart-bar" style="font-size:13px"></i> 통계
      </button>
    </div>
  </div>

  <!-- 오늘 탭 -->
  <div id="panel-today" class="panel active">
    <div class="kpi-row">
      <div class="kpi blue"><div class="kn" id="kpi-total">0</div><div class="kl">전체</div></div>
      <div class="kpi gold"><div class="kn" id="kpi-pend">0</div><div class="kl">예정</div></div>
      <div class="kpi green"><div class="kn" id="kpi-done">0</div><div class="kl">완료</div></div>
      <div class="kpi red"><div class="kn" id="kpi-fail">0</div><div class="kl">무산</div></div>
    </div>

    <div class="add-card">
      <div class="add-card-title"><i class="ti ti-plus-circle"></i> 활동 추가</div>
      <div class="type-btns" id="type-btns">
        <button class="type-btn active" data-type="call" onclick="selectType('call')"><i class="ti ti-phone"></i> 전화콜</button>
        <button class="type-btn" data-type="meet" onclick="selectType('meet')"><i class="ti ti-users"></i> 미팅</button>
        <button class="type-btn" data-type="contract" onclick="selectType('contract')"><i class="ti ti-file-text"></i> 계약</button>
        <button class="type-btn" data-type="followup" onclick="selectType('followup')"><i class="ti ti-refresh"></i> 팔로업</button>
      </div>
      <div class="form-row">
        <input type="text" id="input-name" placeholder="고객명" maxlength="20" />
      </div>
      <div class="form-row">
        <input type="text" id="input-product" placeholder="보험료 (예: 월 5만원)" maxlength="20" />
      </div>
      <div class="form-row">
        <input type="text" id="input-time" placeholder="시간 (예: 오후 2시, 수시)" maxlength="20" />
      </div>
      <div class="form-row">
        <input type="text" id="input-phone" placeholder="연락처 (선택)" maxlength="20" />
      </div>
      <div class="form-row" id="row-birth" style="display:none;">
        <input type="text" id="input-birth" placeholder="생년월일 (예: 19850315)" maxlength="8"
          oninput="calcAge()" style="flex:1" />
        <div id="age-display" style="display:flex;align-items:center;justify-content:center;min-width:64px;height:42px;border-radius:99px;background:var(--gold-bg);color:var(--gold);font-size:14px;font-weight:700;border:1.5px solid var(--gold-light);flex-shrink:0;padding:0 12px;white-space:nowrap;"></div>
      </div>
      <div class="form-row">
        <input type="text" id="input-address" placeholder="주소 (선택)" maxlength="60" />
      </div>
      <div class="form-row">
        <textarea id="input-memo" placeholder="메모 (선택)" maxlength="100"></textarea>
      </div>
      <button class="submit-btn" onclick="addActivity()"><i class="ti ti-plus"></i> 활동 등록</button>
    </div>

    <div class="section-lbl"><i class="ti ti-list"></i> 오늘의 영업 활동</div>
    <div class="activity-list" id="activity-list"></div>
  </div>

  <!-- 과거 탭 -->
  <div id="panel-past" class="panel">
    <div class="past-panel" id="past-panel"></div>
  </div>

  <!-- 통계 탭 -->
  <div id="panel-stats" class="panel">
    <div class="stats-panel" id="stats-panel"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyASLzvLCiAP5taMfAK2EqlSKA6IuQoSOzc",
  authDomain: "my-todo-app-8bc6f.firebaseapp.com",
  databaseURL: "https://my-todo-app-8bc6f-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "my-todo-app-8bc6f",
  storageBucket: "my-todo-app-8bc6f.firebasestorage.app",
  messagingSenderId: "523916936503",
  appId: "1:523916936503:web:57fec3008c60bd6e24c6b2"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const WEEK = ['일','월','화','수','목','금','토'];
const now = new Date();
const todayKey = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
const TYPE_LABEL = { call:'전화콜', meet:'미팅', contract:'계약', followup:'팔로업' };
const TYPE_ICON  = { call:'ti-phone', meet:'ti-users', contract:'ti-file-text', followup:'ti-refresh' };
const TYPE_COLOR = { call:'call', meet:'meet', contract:'contract', followup:'followup' };
const TYPE_BAR_COLOR = { call:'#254d7a', meet:'#c8860a', contract:'#1a7a4a', followup:'#9b59b6' };

document.getElementById('date-label').textContent =
  `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${WEEK[now.getDay()]}요일)`;

let allData = {};
let selectedType = 'call';
let showReasonFor = null;
let selectedPastKey = null;
let chartInst = null;
let currentTab = 'today';

function setSyncStatus(s) {
  const bar = document.getElementById('sync-bar');
  const txt = document.getElementById('sync-text');
  bar.className = 'sync-bar ' + s;
  txt.textContent = s === 'synced' ? '동기화 완료' : s === 'syncing' ? '동기화 중...' : '오프라인';
}

const dataRef = ref(db, 'insurance_crm');
onValue(dataRef, snap => {
  allData = snap.val() || {};
  if (!allData[todayKey]) allData[todayKey] = [];
  document.getElementById('loading-overlay').classList.add('hidden');
  setSyncStatus('synced');
  if (currentTab === 'today') renderToday();
  else if (currentTab === 'past') renderPast();
  else renderStats();
}, () => { setSyncStatus('offline'); document.getElementById('loading-overlay').classList.add('hidden'); });

async function persist() {
  setSyncStatus('syncing');
  try { await set(dataRef, allData); setSyncStatus('synced'); }
  catch(e) { setSyncStatus('offline'); }
}

function getActivities() { return allData[todayKey] || []; }
function setActivities(arr) { allData[todayKey] = arr; }

// ── 타입 선택 ─────────────────────────────
window.selectType = function(type) {
  selectedType = type;
  document.querySelectorAll('.type-btn').forEach(b => b.classList.toggle('active', b.dataset.type === type));
  const p = document.getElementById('input-product');
  p.placeholder = type === 'call' ? '보험료 (예: 월 5만원)' : type === 'contract' ? '상품명 (예: 종신보험)' : type === 'meet' ? '상품명 (예: 연금보험)' : '상품명 (선택)';
  const rowBirth = document.getElementById('row-birth');
  rowBirth.style.display = type === 'call' ? '' : 'none';
  if (type !== 'call') {
    document.getElementById('input-birth').value = '';
    document.getElementById('age-display').textContent = '';
  }
};

window.calcAge = function() {
  const val = document.getElementById('input-birth').value.replace(/[^0-9]/g, '');
  const disp = document.getElementById('age-display');
  if (val.length !== 8) { disp.textContent = ''; return; }
  const y = parseInt(val.slice(0,4)), m = parseInt(val.slice(4,6))-1, d = parseInt(val.slice(6,8));
  if (isNaN(y)||isNaN(m)||isNaN(d)||m<0||m>11||d<1||d>31) { disp.textContent = ''; return; }
  const today = new Date();
  let age = today.getFullYear() - y;
  if (today.getMonth() < m || (today.getMonth() === m && today.getDate() < d)) age--;
  if (age < 0 || age > 120) { disp.textContent = ''; return; }
  disp.textContent = age + '세';
};





// ── 활동 추가 ─────────────────────────────
window.addActivity = async function() {
  const name = document.getElementById('input-name').value.trim();
  const product = document.getElementById('input-product').value.trim();
  const time = document.getElementById('input-time').value.trim();
  const phone = document.getElementById('input-phone').value.trim();
  const memo = document.getElementById('input-memo').value.trim();
  const address = document.getElementById('input-address').value.trim();
  const birth = selectedType === 'call' ? document.getElementById('input-birth').value.trim() : '';
  if (!name) { alert('고객명을 입력해주세요.'); return; }
  const acts = getActivities();
  acts.push({ id: Date.now(), type: selectedType, name, product, time, phone, address, birth, memo, status: 'pending', reason: '' });
  setActivities(acts);
  ['input-name','input-product','input-time','input-phone','input-address','input-memo','input-birth'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('age-display').textContent = '';
  await persist();
};

// ── 상태 변경 ─────────────────────────────
window.markDone = async function(id) {
  const acts = getActivities();
  const a = acts.find(a => a.id === id); if (!a) return;
  a.status = 'done'; a.reason = '';
  if (showReasonFor === id) showReasonFor = null;
  setActivities(acts); await persist();
};
window.markFail = function(id) {
  showReasonFor = showReasonFor === id ? null : id;
  renderToday();
};
window.saveReason = async function(id) {
  const el = document.getElementById('reason-' + id);
  const acts = getActivities();
  const a = acts.find(a => a.id === id); if (!a) return;
  a.status = 'failed'; a.reason = (el?.value || '').trim() || '이유 없음';
  showReasonFor = null; setActivities(acts); await persist();
};
window.undoActivity = async function(id) {
  const acts = getActivities();
  const a = acts.find(a => a.id === id); if (!a) return;
  a.status = 'pending'; a.reason = '';
  setActivities(acts); await persist();
};
window.deleteActivity = async function(id) {
  setActivities(getActivities().filter(a => a.id !== id));
  if (showReasonFor === id) showReasonFor = null;
  await persist();
};

// ── 오늘 렌더링 ───────────────────────────
function renderToday() {
  const acts = getActivities();
  const total = acts.length;
  const done  = acts.filter(a => a.status === 'done').length;
  const fail  = acts.filter(a => a.status === 'failed').length;
  const pend  = acts.filter(a => a.status === 'pending').length;
  document.getElementById('kpi-total').textContent = total;
  document.getElementById('kpi-pend').textContent  = pend;
  document.getElementById('kpi-done').textContent  = done;
  document.getElementById('kpi-fail').textContent  = fail;
  document.getElementById('today-goal-badge').textContent = `오늘 ${total}건`;

  const list = document.getElementById('activity-list');
  if (acts.length === 0) {
    list.innerHTML = '<div class="empty-state"><i class="ti ti-phone-plus"></i>오늘의 영업 활동을 추가해보세요!</div>';
    return;
  }

  function buildCard(a) {
    const showReason = showReasonFor === a.id && a.status === 'pending';
    const typeColor = TYPE_COLOR[a.type] || 'call';
    const statusBadge = a.status === 'done'
      ? '<span class="act-status-badge done"><i class="ti ti-check" style="font-size:10px"></i> 완료</span>'
      : a.status === 'failed'
      ? '<span class="act-status-badge failed"><i class="ti ti-x" style="font-size:10px"></i> 무산</span>'
      : '';
    let btns = '';
    if (a.status === 'pending') {
      btns = `<button class="act-btn done-btn" onclick="markDone(${a.id})"><i class="ti ti-check"></i> 완료</button>
              <button class="act-btn fail-btn" onclick="markFail(${a.id})"><i class="ti ti-x"></i> 무산</button>
              <button class="act-btn del-btn" onclick="deleteActivity(${a.id})"><i class="ti ti-trash"></i></button>`;
    } else {
      btns = `<button class="act-btn undo-btn" onclick="undoActivity(${a.id})"><i class="ti ti-rotate-left"></i> 되돌리기</button>
              <button class="act-btn del-btn" onclick="deleteActivity(${a.id})"><i class="ti ti-trash"></i></button>`;
    }
    const reasonSection = showReason
      ? `<div class="reason-box">
           <textarea class="reason-input" id="reason-${a.id}" placeholder="무산 이유를 입력하세요 (고객 거절, 연락 불가 등)"></textarea>
           <button class="reason-save-btn" onclick="saveReason(${a.id})">저장</button>
         </div>`
      : (a.reason ? `<div class="reason-display"><i class="ti ti-alert-circle" style="font-size:13px;flex-shrink:0;margin-top:1px"></i>${a.reason}</div>` : '');
    return `<div class="act-card ${typeColor} ${a.status === 'done' || a.status === 'failed' ? 'done' : ''}">
      <div class="act-top">
        <span class="act-type-badge ${typeColor}"><i class="ti ${TYPE_ICON[a.type]}"></i> ${TYPE_LABEL[a.type]}</span>
        <div class="act-body">
          <div class="act-name">${a.name} ${a.product ? `<span style="font-size:12px;font-weight:400;color:var(--text2)">· ${a.product}</span>` : ''}</div>
          ${a.memo ? `<div class="act-detail">${a.memo}</div>` : ''}
          <div class="act-meta">
            ${a.birth && a.birth.length === 8 ? (() => { const y=parseInt(a.birth.slice(0,4)),m=parseInt(a.birth.slice(4,6))-1,d=parseInt(a.birth.slice(6,8)); const today=new Date(); let age=today.getFullYear()-y; if(today.getMonth()<m||(today.getMonth()===m&&today.getDate()<d))age--; return `<span class="act-tag" style="background:var(--gold-bg);color:var(--gold);font-weight:700;"><i class="ti ti-cake" style="font-size:11px"></i>${a.birth.slice(0,4)}.${a.birth.slice(4,6)}.${a.birth.slice(6,8)} · ${age}세</span>`; })() : ''}
            ${a.time ? `<span class="act-tag"><i class="ti ti-clock" style="font-size:11px"></i>${a.time}</span>` : ''}
            ${a.phone ? `<span class="act-tag"><i class="ti ti-phone" style="font-size:11px"></i>${a.phone}</span>` : ''}
            ${a.address ? `<span class="act-tag"><i class="ti ti-map-pin" style="font-size:11px"></i>${a.address}</span>` : ''}
            ${statusBadge}
          </div>
        </div>
      </div>
      <div class="act-status-row">${btns}</div>
      ${reasonSection}
    </div>`;
  }

  const groups = [
    { type: 'call',     label: '전화콜',  icon: 'ti-phone',     color: 'call' },
    { type: 'meet',     label: '미팅',    icon: 'ti-users',     color: 'meet' },
    { type: 'contract', label: '계약',    icon: 'ti-file-text', color: 'contract' },
    { type: 'followup', label: '팔로업',  icon: 'ti-refresh',   color: 'followup' },
  ];

  const groupColors = { call: '#254d7a', meet: '#c8860a', contract: '#1a7a4a', followup: '#9b59b6' };
  const groupBg     = { call: '#e8f2fb', meet: '#fef8ec', contract: '#eaf5ef', followup: '#f3eafd' };

  list.innerHTML = groups.map(g => {
    const items = acts.filter(a => a.type === g.type);
    if (items.length === 0) return '';
    return `
      <div class="group-section" style="margin-bottom:16px;">
        <div class="group-header" style="display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:8px 14px;background:${groupBg[g.type]};border-radius:99px;">
          <i class="ti ${g.icon}" style="font-size:15px;color:${groupColors[g.type]}"></i>
          <span style="font-size:13px;font-weight:700;color:${groupColors[g.type]}">${g.label}</span>
          <span style="font-size:11px;font-weight:600;background:${groupColors[g.type]};color:#fff;padding:2px 9px;border-radius:99px;margin-left:2px;">${items.length}건</span>
        </div>
        <div style="display:flex;flex-direction:column;gap:9px;">
          ${items.map(a => buildCard(a)).join('')}
        </div>
      </div>`;
  }).join('');
}

// ── 과거 탭 렌더링 ────────────────────────
function renderPast() {
  const panel = document.getElementById('past-panel');
  const pastKeys = Object.keys(allData).filter(k => k !== todayKey).sort().reverse();
  if (pastKeys.length === 0) {
    panel.innerHTML = '<div class="no-data"><i class="ti ti-clock"></i>아직 과거 기록이 없어요.</div>';
    return;
  }
  if (!selectedPastKey || !allData[selectedPastKey]) selectedPastKey = pastKeys[0];
  const chipHtml = pastKeys.map(k => {
    const [,m,d] = k.split('-');
    return `<button class="date-chip ${k === selectedPastKey ? 'selected' : ''}" onclick="selectPastDay('${k}')">${parseInt(m)}/${parseInt(d)}</button>`;
  }).join('');
  const arr = allData[selectedPastKey] || [];
  const done = arr.filter(a => a.status === 'done').length;
  const fail = arr.filter(a => a.status === 'failed').length;
  const pend = arr.filter(a => a.status === 'pending').length;
  const total = arr.length;
  const dPct = total > 0 ? Math.round(done/total*100) : 0;
  const fPct = total > 0 ? Math.round(fail/total*100) : 0;
  const pPct = 100 - dPct - fPct;
  const contracts = arr.filter(a => a.type === 'contract' && a.status === 'done').length;
  const [yr, mo, dy] = selectedPastKey.split('-');
  const dateObj = new Date(parseInt(yr), parseInt(mo)-1, parseInt(dy));
  const dayLabel = `${parseInt(yr)}년 ${parseInt(mo)}월 ${parseInt(dy)}일 (${WEEK[dateObj.getDay()]}요일)`;
  const curIdx = pastKeys.indexOf(selectedPastKey);

  const actHtml = arr.length === 0
    ? '<div style="color:var(--text3);font-size:14px;padding:1rem;text-align:center">이 날은 활동 기록이 없어요</div>'
    : arr.map(a => {
        const typeColor = TYPE_COLOR[a.type] || 'call';
        const sb = a.status === 'done'
          ? '<span class="act-status-badge done" style="font-size:10px;padding:2px 8px">완료</span>'
          : a.status === 'failed'
          ? '<span class="act-status-badge failed" style="font-size:10px;padding:2px 8px">무산</span>'
          : '<span style="font-size:10px;padding:2px 8px;background:var(--gold-bg);color:var(--gold);border-radius:99px;font-weight:700">예정</span>';
        return `<div class="act-card ${typeColor}" style="margin-bottom:7px">
          <div class="act-top">
            <span class="act-type-badge ${typeColor}"><i class="ti ${TYPE_ICON[a.type]}"></i> ${TYPE_LABEL[a.type]}</span>
            <div class="act-body">
              <div class="act-name">${a.name} ${a.product ? `<span style="font-size:12px;font-weight:400;color:var(--text2)">· ${a.product}</span>` : ''}</div>
              ${a.memo ? `<div class="act-detail">${a.memo}</div>` : ''}
              <div class="act-meta">
                ${a.time ? `<span class="act-tag"><i class="ti ti-clock" style="font-size:11px"></i>${a.time}</span>` : ''}
                ${a.phone ? `<span class="act-tag"><i class="ti ti-phone" style="font-size:11px"></i>${a.phone}</span>` : ''}
            ${a.address ? `<span class="act-tag"><i class="ti ti-map-pin" style="font-size:11px"></i>${a.address}</span>` : ''}
                ${sb}
              </div>
              ${a.reason ? `<div class="reason-display" style="margin-top:6px"><i class="ti ti-alert-circle" style="font-size:13px;flex-shrink:0"></i>${a.reason}</div>` : ''}
            </div>
          </div>
        </div>`;
      }).join('');

  panel.innerHTML = `
    <div class="date-nav">
      <button class="nav-btn" onclick="navPastDay(1)" ${curIdx >= pastKeys.length-1 ? 'disabled' : ''}><i class="ti ti-chevron-left"></i></button>
      <div class="chip-scroll">${chipHtml}</div>
      <button class="nav-btn" onclick="navPastDay(-1)" ${curIdx <= 0 ? 'disabled' : ''}><i class="ti ti-chevron-right"></i></button>
    </div>
    <div class="past-day-card">
      <div class="past-day-title"><i class="ti ti-calendar-event"></i>${dayLabel}</div>
      <div class="past-summary-grid">
        <div class="ps-item blue"><div class="pn">${total}</div><div class="pl">전체</div></div>
        <div class="ps-item green"><div class="pn">${done}</div><div class="pl">완료</div></div>
        <div class="ps-item red"><div class="pn">${fail}</div><div class="pl">무산</div></div>
        <div class="ps-item gold"><div class="pn">${contracts}</div><div class="pl">계약</div></div>
      </div>
      ${total > 0 ? `
      <div class="past-bar">
        <div class="past-bar-done" style="width:${dPct}%"></div>
        <div class="past-bar-fail" style="width:${fPct}%"></div>
        <div class="past-bar-pend" style="width:${pPct}%"></div>
      </div>
      <div class="leg-row">
        <span><span class="leg-sq" style="background:var(--green)"></span>완료 ${dPct}%</span>
        <span><span class="leg-sq" style="background:var(--red)"></span>무산 ${fPct}%</span>
        ${pend > 0 ? `<span><span class="leg-sq" style="background:var(--sky2)"></span>예정 ${pPct}%</span>` : ''}
      </div>` : ''}
      <div>${actHtml}</div>
    </div>`;
  setTimeout(() => {
    document.querySelector('.date-chip.selected')?.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
  }, 50);
}

window.selectPastDay = k => { selectedPastKey = k; renderPast(); };
window.navPastDay = dir => {
  const keys = Object.keys(allData).filter(k => k !== todayKey).sort().reverse();
  const next = keys.indexOf(selectedPastKey) + dir;
  if (next >= 0 && next < keys.length) { selectedPastKey = keys[next]; renderPast(); }
};

// ── 통계 탭 렌더링 ────────────────────────
function renderStats() {
  const panel = document.getElementById('stats-panel');
  const allKeys = Object.keys(allData).sort();
  let totalAll=0, doneAll=0, failAll=0, contractAll=0;
  const typeCounts = { call:0, meet:0, contract:0, followup:0 };
  const recentKeys = allKeys.slice(-14);
  const chartDone = recentKeys.map(k => (allData[k]||[]).filter(a=>a.status==='done').length);
  const chartFail = recentKeys.map(k => (allData[k]||[]).filter(a=>a.status==='failed').length);
  const chartPend = recentKeys.map(k => (allData[k]||[]).filter(a=>a.status==='pending').length);
  const chartLabels = recentKeys.map(k => { const [,m,d]=k.split('-'); return `${parseInt(m)}/${parseInt(d)}`; });
  allKeys.forEach(k => {
    (allData[k]||[]).forEach(a => {
      totalAll++;
      if (a.status==='done') doneAll++;
      if (a.status==='failed') failAll++;
      if (a.type==='contract' && a.status==='done') contractAll++;
      if (typeCounts[a.type] !== undefined) typeCounts[a.type]++;
    });
  });
  const finished = doneAll + failAll;
  const donePct = finished > 0 ? Math.round(doneAll/finished*100) : 0;
  const failPct = finished > 0 ? 100 - donePct : 0;
  const maxType = Math.max(...Object.values(typeCounts), 1);

  if (totalAll === 0) {
    panel.innerHTML = '<div class="no-data"><i class="ti ti-chart-bar"></i>아직 기록이 없어요.</div>';
    return;
  }

  const doneW = donePct > 0 ? Math.max(donePct, 8) : 0;
  const isFull = failPct === 0;

  panel.innerHTML = `
    <div class="stat-card">
      <div class="stat-title"><i class="ti ti-trophy"></i> 전체 누적 성과</div>
      <div class="stat-grid">
        <div class="sg-item blue"><div class="gn">${totalAll}</div><div class="gl">총 활동 건수</div></div>
        <div class="sg-item green"><div class="gn">${doneAll}</div><div class="gl">완료 건수</div></div>
        <div class="sg-item gold"><div class="gn">${contractAll}</div><div class="gl">계약 성사</div></div>
        <div class="sg-item red"><div class="gn">${failAll}</div><div class="gl">무산 건수</div></div>
      </div>
      <div class="big-bar-wrap">
        <div class="big-bar-labels">
          <span class="big-bar-done-lbl"><i class="ti ti-check" style="font-size:12px"></i> 완료율 ${donePct}%</span>
          <span class="big-bar-fail-lbl">무산율 ${failPct}% <i class="ti ti-x" style="font-size:12px"></i></span>
        </div>
        <div class="big-bar-track">
          <div class="big-bar-done ${isFull?'full':''}" style="width:${doneW}%">
            ${donePct >= 15 ? `<span class="big-bar-pct">${donePct}%</span>` : ''}
          </div>
          ${!isFull ? '<div class="big-bar-fail"></div>' : ''}
        </div>
      </div>
      <div class="leg-row" style="margin-top:8px">
        <span><span class="leg-sq" style="background:var(--green)"></span>완료 (${doneAll}건)</span>
        <span><span class="leg-sq" style="background:var(--red)"></span>무산 (${failAll}건)</span>
        ${totalAll-finished > 0 ? `<span><span class="leg-sq" style="background:var(--sky2)"></span>예정 (${totalAll-finished}건)</span>` : ''}
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-title"><i class="ti ti-category"></i> 활동 유형별 분포</div>
      <div class="type-breakdown">
        ${[['call','ti-phone','#254d7a'],['meet','ti-users','#c8860a'],['contract','ti-file-text','#1a7a4a'],['followup','ti-refresh','#9b59b6']].map(([t,ic,cl])=>`
        <div class="tb-row">
          <div class="tb-label"><i class="ti ${ic}" style="font-size:13px;color:${cl}"></i> ${TYPE_LABEL[t]}</div>
          <div class="tb-bar"><div class="tb-fill" style="width:${Math.round(typeCounts[t]/maxType*100)}%;background:${cl}"></div></div>
          <div class="tb-count">${typeCounts[t]}건</div>
        </div>`).join('')}
      </div>
    </div>

    <div class="stat-card">
      <div class="stat-title"><i class="ti ti-chart-bar"></i> 최근 ${chartLabels.length}일 활동 현황</div>
      <div class="leg-row">
        <span><span class="leg-sq" style="background:var(--green)"></span>완료</span>
        <span><span class="leg-sq" style="background:var(--red)"></span>무산</span>
        <span><span class="leg-sq" style="background:var(--sky2)"></span>예정</span>
      </div>
      <div style="position:relative;width:100%;height:${Math.max(160,chartLabels.length*20)}px;">
        <canvas id="daily-chart" role="img" aria-label="날짜별 영업 활동 통계">날짜별 영업 통계</canvas>
      </div>
    </div>`;

  setTimeout(() => {
    const ctx = document.getElementById('daily-chart');
    if (!ctx) return;
    if (chartInst) { chartInst.destroy(); chartInst = null; }
    chartInst = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: chartLabels,
        datasets: [
          { label:'완료', data:chartDone, backgroundColor:'#1a7a4a', borderRadius:6, borderSkipped:false },
          { label:'무산', data:chartFail, backgroundColor:'#b03030', borderRadius:6, borderSkipped:false },
          { label:'예정', data:chartPend, backgroundColor:'#90bfe8', borderRadius:6, borderSkipped:false }
        ]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ display:false } },
        scales:{
          x:{ stacked:true, grid:{display:false}, ticks:{color:'#8a95a3',font:{size:10},autoSkip:false,maxRotation:45} },
          y:{ stacked:true, grid:{color:'rgba(0,0,0,0.05)'}, ticks:{color:'#8a95a3',font:{size:10},stepSize:1}, beginAtZero:true }
        }
      }
    });
  }, 100);
}

// ── 탭 전환 ──────────────────────────────
window.switchTab = function(tab) {
  currentTab = tab;
  ['today','past','stats'].forEach(t => {
    document.getElementById('panel-' + t).classList.toggle('active', t === tab);
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
  });
  if (tab === 'past') renderPast();
  if (tab === 'stats') renderStats();
};
</script>
</body>
</html>
